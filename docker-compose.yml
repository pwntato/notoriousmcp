services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: localuser
      MINIO_ROOT_PASSWORD: localpassword
    command: server /data --console-address ":9001"

  init:
    image: amazon/aws-cli:latest
    depends_on:
      - dynamodb
      - minio
    env_file: .env
    environment:
      AWS_ACCESS_KEY_ID: localuser
      AWS_SECRET_ACCESS_KEY: localpassword
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: /bin/sh
    command: >-
      -c "
      aws dynamodb describe-table
        --endpoint-url http://dynamodb:8000
        --table-name notoriousmcp
        > /dev/null 2>&1
      || aws dynamodb create-table
        --endpoint-url http://dynamodb:8000
        --table-name notoriousmcp
        --attribute-definitions
          AttributeName=PK,AttributeType=S
          AttributeName=SK,AttributeType=S
          AttributeName=GSI1PK,AttributeType=S
          AttributeName=GSI1SK,AttributeType=S
        --key-schema
          AttributeName=PK,KeyType=HASH
          AttributeName=SK,KeyType=RANGE
        --global-secondary-indexes '[{\"IndexName\":\"GSI1\",\"KeySchema\":[{\"AttributeName\":\"GSI1PK\",\"KeyType\":\"HASH\"},{\"AttributeName\":\"GSI1SK\",\"KeyType\":\"RANGE\"}],\"Projection\":{\"ProjectionType\":\"ALL\"}}]'
        --billing-mode PAY_PER_REQUEST
      ;
      aws --endpoint-url http://minio:9000 s3 ls s3://notoriousmcp-local
        > /dev/null 2>&1
      || aws --endpoint-url http://minio:9000 s3 mb s3://notoriousmcp-local
      "

  server:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: notoriousmcp-local
      TABLE_NAME: notoriousmcp
      ENVIRONMENT: local
      AWS_ACCESS_KEY_ID: localuser
      AWS_SECRET_ACCESS_KEY: localpassword
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      init:
        condition: service_completed_successfully
