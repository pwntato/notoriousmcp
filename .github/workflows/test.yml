name: test

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: init DynamoDB table
        env:
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws dynamodb create-table \
            --endpoint-url http://localhost:8000 \
            --table-name notoriousmcp \
            --attribute-definitions \
              AttributeName=PK,AttributeType=S \
              AttributeName=SK,AttributeType=S \
              AttributeName=GSI1PK,AttributeType=S \
              AttributeName=GSI1SK,AttributeType=S \
            --key-schema \
              AttributeName=PK,KeyType=HASH \
              AttributeName=SK,KeyType=RANGE \
            --global-secondary-indexes '[{"IndexName":"GSI1","KeySchema":[{"AttributeName":"GSI1PK","KeyType":"HASH"},{"AttributeName":"GSI1SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
            --billing-mode PAY_PER_REQUEST

      - name: start MinIO and init bucket
        env:
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_DEFAULT_REGION: us-east-1
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=local \
            -e MINIO_ROOT_PASSWORD=local \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break || sleep 1
          done
          aws --endpoint-url http://localhost:9000 s3 mb s3://notoriousmcp-local

      - name: go test
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          TABLE_NAME: notoriousmcp
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: notoriousmcp-local
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
          AWS_DEFAULT_REGION: us-east-1
        run: go test ./...

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.0

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: fmt check (main)
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: validate (main)
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: terraform

      - name: fmt check (bootstrap)
        run: terraform fmt -check -recursive
        working-directory: terraform/bootstrap

      - name: validate (bootstrap)
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: terraform/bootstrap
